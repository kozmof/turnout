name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  quality:
    name: Quality Gates
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [22, 24]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: packages/go/converter/go.mod
          cache-dependency-path: packages/go/converter/go.sum

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check generated proto output
        run: pnpm run check:proto

      - name: Check Go FieldType initialization
        run: pnpm run check:fieldtype

      - name: Check formatting
        run: pnpm run check:format

      - name: Build
        run: pnpm run build

      - name: Typecheck
        run: pnpm run typecheck

      - name: Lint
        run: pnpm run lint

      - name: Vet and race-test Go
        run: pnpm run test:go:quality

      - name: Test
        run: pnpm test

      - name: Coverage
        run: pnpm run test:coverage

  staticcheck:
    name: Staticcheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: packages/go/converter/go.mod
          cache-dependency-path: packages/go/converter/go.sum

      - name: Run Staticcheck
        uses: dominikh/staticcheck-action@v1.4.1
        with:
          version: "2025.1.1"
          install-go: false
          working-directory: packages/go/converter

  fuzz:
    name: Bounded Go Fuzzing
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: packages/go/converter/go.mod
          cache-dependency-path: packages/go/converter/go.sum

      - name: Fuzz lexer
        working-directory: packages/go/converter
        run: go test ./internal/lexer -run='^$' -fuzz=FuzzTokenize -fuzztime=10s

      - name: Fuzz parser
        working-directory: packages/go/converter
        run: go test ./internal/parser -run='^$' -fuzz=FuzzParseFile -fuzztime=10s
