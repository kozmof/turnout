name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  quality:
    name: Quality Gates
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [22, 24, 25]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: packages/go/converter/go.mod
          cache-dependency-path: packages/go/converter/go.sum

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check generated proto output
        run: pnpm run check:proto

      - name: Check Go FieldType initialization
        run: pnpm run check:fieldtype

      - name: Check formatting
        run: pnpm run check:format

      - name: Build
        run: pnpm run build

      - name: Typecheck
        run: pnpm run typecheck

      - name: Lint
        run: pnpm run lint

      - name: Vet and race-test Go
        run: pnpm run test:go:quality

      - name: Test
        run: pnpm test

      - name: Coverage
        run: pnpm run test:coverage
