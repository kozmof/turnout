syntax = "proto3";

// Package turnout.model.v1 is the single source of truth for the JSON contract
// emitted by the Go converter (-format json) and consumed by the TypeScript
// scene-runner. Changing this file and running `buf generate` from the repo
// root regenerates both the Go and TypeScript types automatically.
package turnout.model.v1;

import "google/protobuf/struct.proto";

option go_package = "github.com/kozmof/turnout/packages/go/converter/internal/emit/turnoutpb";

// ─────────────────────────────────────────────────────────────────────────────
// Top-level model
// ─────────────────────────────────────────────────────────────────────────────

message TurnModel {
  StateModel state = 1;
  repeated SceneBlock scenes = 2;
  repeated RouteModel routes = 3;
  // version identifies the schema revision. The Go emitter sets this to 1.
  // The TypeScript runner validates this on load and rejects other values.
  uint32 version = 4;
  // annotations carries sigil metadata from the DSL that cannot be represented
  // in the flat binding model. Populated by the Go lowerer; consumed by the
  // validator. Not serialised into the final JSON emitted to the runtime.
  optional SigilAnnotations annotations = 5;
  // min_version / max_version declare the runtime version range this model
  // requires. Absent (zero) means unconstrained. The TypeScript runner should
  // reject models where CURRENT_VERSION < min_version or > max_version.
  uint32 min_version = 6;
  uint32 max_version = 7;
}

// SigilAnnotations carries sigil metadata for each binding.
// entries is the canonical representation.
message SigilAnnotations {
  reserved 1; reserved "sigils"; // removed legacy map<string, int32> sigils
  repeated SigilAnnotation entries = 2;
}

message SigilAnnotation {
  string scene_id = 1;
  string action_id = 2;
  string scope = 3;
  string prog_name = 4;
  string binding_name = 5;
  int32 sigil = 6;
}

// ─────────────────────────────────────────────────────────────────────────────
// Source position — compile-time metadata, never serialised to JSON
// ─────────────────────────────────────────────────────────────────────────────

// SourcePos carries the source location of a binding set by the lowerer.
// Cleared before JSON emission; not visible to the runtime.
message SourcePos {
  string file = 1;
  int32  line  = 2;
  int32  col   = 3;
}

// ─────────────────────────────────────────────────────────────────────────────
// State
// ─────────────────────────────────────────────────────────────────────────────

message StateModel {
  repeated NamespaceModel namespaces = 1;
}

message NamespaceModel {
  string name = 1;
  repeated FieldModel fields = 2;
}

message FieldModel {
  string name = 1;
  // type is one of: "number" | "str" | "bool" | "arr<number>" | "arr<str>" | "arr<bool>"
  string type = 2;
  google.protobuf.Value value = 3;
}

// ─────────────────────────────────────────────────────────────────────────────
// Scene / Action
// ─────────────────────────────────────────────────────────────────────────────

message SceneBlock {
  string id = 1;
  repeated string entry_actions = 2;
  // next_policy is one of: "first-match" | "all-match". Absent means first-match.
  optional string next_policy = 3;
  repeated ActionModel actions = 4;
  optional ViewBlock view = 5;
}

// ViewBlock carries the authoring-time overview annotation for a scene.
// name must be "overview". enforce is one of: "nodes_only" | "at_least" | "strict".
message ViewBlock {
  string name = 1;
  string flow = 2;
  optional string enforce = 3;
}

message ActionModel {
  string id = 1;
  ComputeModel compute = 2;
  repeated PrepareEntry prepare = 3;
  repeated MergeEntry merge = 4;
  repeated string publish = 5;
  repeated NextRuleModel next = 6;
  // text is the narrative description of the action (optional authoring metadata).
  optional string text = 7;
}

// ─────────────────────────────────────────────────────────────────────────────
// Compute / Prog / Binding
// ─────────────────────────────────────────────────────────────────────────────

message ComputeModel {
  // root is the binding name whose resolved value is the action's compute output.
  string root = 1;
  ProgModel prog = 2;
}

message ProgModel {
  string name = 1;
  repeated BindingModel bindings = 2;
  // sigils carries binding-sigil metadata populated by the lowerer and consumed
  // by the validator. Cleared before JSON emission; not visible to the runtime.
  map<string, int32> sigils = 3;
}

message BindingModel {
  string name = 1;
  // type is a FieldTypeStr: "number" | "str" | "bool" | "arr<number>" | "arr<str>" | "arr<bool>"
  string type = 2;
  // Exactly one of value or expr is present.
  google.protobuf.Value value = 3;
  ExprModel expr = 4;
  // ext_expr carries the structured source expression for #if/#case/#pipe bindings.
  // Populated by the HCL emitter to round-trip those forms. MUST NOT be set in
  // JSON output; the runtime ignores this field entirely.
  LocalExprModel ext_expr = 5;
  // source_pos is populated by the lowerer for user-declared bindings.
  // Cleared before JSON emission; not visible to the runtime.
  optional SourcePos source_pos = 6;
}

message ExprModel {
  // Exactly one of combine, pipe, or cond is present.
  CombineExpr combine = 1;
  PipeExpr pipe = 2;
  CondExpr cond = 3;
}

message CombineExpr {
  string fn = 1;
  repeated ArgModel args = 2;
}

message PipeExpr {
  repeated PipeParam params = 1;
  repeated PipeStep steps = 2;
}

message PipeParam {
  string param_name = 1;
  string source_ident = 2;
}

message PipeStep {
  string fn = 1;
  repeated ArgModel args = 2;
}

message CondExpr {
  ArgModel condition = 1;
  ArgModel then = 2;
  // Note: field is named else_branch because "else" is a reserved word in
  // generated code. The JSON key is "elseBranch" (camelCase).
  ArgModel else_branch = 3;
}

message ArgModel {
  // Exactly one of the following is present.
  optional string ref = 1;
  google.protobuf.Value lit = 2;
  optional string func_ref = 3;
  // step_ref uses optional so that value 0 is serialised (not omitted).
  optional int32 step_ref = 4;
  TransformArg transform = 5;
}

message TransformArg {
  string ref = 1;
  repeated string fn = 2;
}

// ─────────────────────────────────────────────────────────────────────────────
// Prepare / Merge
// ─────────────────────────────────────────────────────────────────────────────

message PrepareEntry {
  string binding = 1;
  // Exactly one of from_state or from_hook is present.
  optional string from_state = 2;
  optional string from_hook = 3;
}

message MergeEntry {
  string binding = 1;
  string to_state = 2;
}

// ─────────────────────────────────────────────────────────────────────────────
// Next rules
// ─────────────────────────────────────────────────────────────────────────────

message NextRuleModel {
  NextComputeModel compute = 1;
  repeated NextPrepareEntry prepare = 2;
  string action = 3;
}

message NextComputeModel {
  // condition is the binding name within prog whose boolean value gates the transition.
  string condition = 1;
  ProgModel prog = 2;
}

message NextPrepareEntry {
  string binding = 1;
  // Exactly one of from_action, from_state, or from_literal is present.
  optional string from_action = 2;
  optional string from_state = 3;
  google.protobuf.Value from_literal = 4;
}

// ─────────────────────────────────────────────────────────────────────────────
// Route
// ─────────────────────────────────────────────────────────────────────────────

message RouteModel {
  string id = 1;
  repeated MatchArm match = 2;
  optional string entry_scene_id = 3;
}

message MatchArm {
  // patterns holds raw pattern strings. "_" is fallback; "scene.action" or
  // "scene.*.action[.action...]" are path forms. Multiple entries are OR-joined.
  repeated string patterns = 1;
  string target = 2;
}

// ─────────────────────────────────────────────────────────────────────────────
// Local expression — structured form stored alongside flat bindings for
// HCL re-emission. Present only on #if / #case / #pipe user bindings.
// The runtime ignores this field; it executes only the flat ExprModel bindings.
// ─────────────────────────────────────────────────────────────────────────────

message LocalExprModel {
  oneof expr {
    LocalRefExprModel   ref       = 1;
    LocalLitExprModel   lit       = 2;
    LocalItExprModel    it        = 3;
    LocalCallExprModel  call      = 4;
    LocalInfixExprModel infix     = 5;
    LocalIfExprModel    if_expr   = 6;
    LocalCaseExprModel  case_expr = 7;
    LocalPipeExprModel  pipe_expr = 8;
  }
}

message LocalRefExprModel  { string name = 1; }
message LocalLitExprModel  { google.protobuf.Value value = 1; }
message LocalItExprModel   {}

message LocalCallExprModel {
  string fn = 1;
  repeated LocalExprModel args = 2;
}

// InfixOp enumerates DSL infix operators. Values match ast.InfixOp iota so
// existing serialized models remain valid after the int32 → enum migration.
enum InfixOp {
  INFIX_OP_AND     = 0;  // & → bool_and
  INFIX_OP_GTE     = 1;  // >= → gte
  INFIX_OP_LTE     = 2;  // <= → lte
  INFIX_OP_GT      = 3;  // > → gt
  INFIX_OP_LT      = 4;  // < → lt
  INFIX_OP_BOOL_OR = 5;  // | → bool_or
  INFIX_OP_EQ      = 6;  // == → eq
  INFIX_OP_NEQ     = 7;  // != → neq
  INFIX_OP_PLUS    = 8;  // + → add (number) / str_concat (str)
  INFIX_OP_SUB     = 9;  // - → sub
  INFIX_OP_MUL     = 10; // * → mul
  INFIX_OP_DIV     = 11; // / → div
  INFIX_OP_MOD     = 12; // % → mod
}

message LocalInfixExprModel {
  InfixOp op = 1;
  LocalExprModel lhs = 2;
  LocalExprModel rhs = 3;
}

message LocalIfExprModel {
  LocalExprModel cond        = 1;
  LocalExprModel then        = 2;
  LocalExprModel else_branch = 3;
}

message LocalCaseArmModel {
  LocalCasePatternModel pattern = 1;
  LocalExprModel        guard   = 2; // nil when no guard
  LocalExprModel        expr    = 3;
}

message LocalCaseExprModel {
  LocalExprModel            subject = 1;
  repeated LocalCaseArmModel arms   = 2;
}

message LocalPipeExprModel {
  LocalExprModel            initial = 1;
  repeated LocalExprModel   steps   = 2;
}

message LocalCasePatternModel {
  // Field 4 (LocalTuplePatternModel tuple) was removed; tuple patterns are
  // rejected at parse time and were never serialised into valid models.
  reserved 4; reserved "tuple";
  oneof pattern {
    LocalWildcardPatternModel  wildcard   = 1;
    LocalLitPatternModel       lit        = 2;
    LocalVarBinderPatternModel var_binder = 3;
  }
}

message LocalWildcardPatternModel  {}
message LocalLitPatternModel       { google.protobuf.Value value = 1; }
message LocalVarBinderPatternModel { string name = 1; }
